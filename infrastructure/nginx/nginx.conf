user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Cache
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m 
                     inactive=24h max_size=1g;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Upstream N8N
    upstream n8n_backend {
        least_conn;
        server n8n:5678 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream FastAPI
    upstream fastapi_backend {
        least_conn;
        server fastapi:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream Grafana
    upstream grafana_backend {
        server grafana:3000;
    }

    # =====================================================
    # HTTP → HTTPS REDIRECT
    # =====================================================
    server {
        listen 80;
        server_name n8n.jobnexai.com api.jobnexai.com monitoring.jobnexai.com;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =====================================================
    # N8N WORKFLOWS
    # =====================================================
    server {
        listen 443 ssl http2;
        server_name n8n.jobnexai.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/n8n.jobnexai.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/n8n.jobnexai.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Logs
        access_log /var/log/nginx/n8n-access.log main;
        error_log /var/log/nginx/n8n-error.log warn;

        # Rate Limiting
        limit_req zone=webhook_limit burst=100 nodelay;
        limit_conn conn_limit 50;

        # Proxy Settings
        location / {
            proxy_pass http://n8n_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket Support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffering
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Webhook endpoints (no auth)
        location /webhook/ {
            proxy_pass http://n8n_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Higher timeout for webhooks
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Health Check
        location /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # =====================================================
    # FASTAPI BACKEND
    # =====================================================
    server {
        listen 443 ssl http2;
        server_name api.jobnexai.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/api.jobnexai.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/api.jobnexai.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Logs
        access_log /var/log/nginx/api-access.log main;
        error_log /var/log/nginx/api-error.log warn;

        # Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 100;

        # CORS (si nécessaire)
        add_header Access-Control-Allow-Origin "https://jobnexai.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        location / {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static files cache
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
            proxy_pass http://fastapi_backend;
            proxy_cache STATIC;
            proxy_cache_valid 200 1d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
            expires 1d;
        }

        # Health Check
        location /health {
            access_log off;
            proxy_pass http://fastapi_backend/health;
        }
    }

    # =====================================================
    # GRAFANA MONITORING
    # =====================================================
    server {
        listen 443 ssl http2;
        server_name monitoring.jobnexai.com;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/monitoring.jobnexai.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/monitoring.jobnexai.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Logs
        access_log /var/log/nginx/monitoring-access.log main;
        error_log /var/log/nginx/monitoring-error.log warn;

        # IP Whitelist (optionnel - à adapter)
        # allow 1.2.3.4;  # Ton IP
        # deny all;

        location / {
            proxy_pass http://grafana_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Support (Grafana Live)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
