global:
  resolve_timeout: 5m
  slack_api_url: 'YOUR_SLACK_WEBHOOK_URL'

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  
  routes:
    # Critical alerts → Slack + Email
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    
    # High priority → Slack
    - match:
        severity: high
      receiver: 'high-alerts'
      continue: true
    
    # Warning → Slack (throttled)
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 4h

# Receivers
receivers:
  - name: 'default'
    slack_configs:
      - channel: '#jobnexai-monitoring'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'critical-alerts'
    slack_configs:
      - channel: '#jobnexai-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          *Environment:* {{ .GroupLabels.environment }}
          *Service:* {{ .GroupLabels.service }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          *Runbook:* {{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}
        color: 'danger'
        send_resolved: true
    
    # Email notification (optionnel)
    # email_configs:
    #   - to: 'lionel@jobnexai.com'
    #     from: 'alerts@jobnexai.com'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: 'alerts@jobnexai.com'
    #     auth_password: 'YOUR_PASSWORD'

  - name: 'high-alerts'
    slack_configs:
      - channel: '#jobnexai-monitoring'
        title: '⚠️ HIGH: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'warning'
        send_resolved: true

  - name: 'warning-alerts'
    slack_configs:
      - channel: '#jobnexai-monitoring'
        title: '⚡ Warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        color: 'good'

# Inhibition rules
inhibit_rules:
  # Inhibit warning if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
  
  # Inhibit high if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'high'
    equal: ['alertname', 'instance']
