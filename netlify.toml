# Configuration Netlify simplifiée
[build]
  command = "echo VITE_SUPABASE_URL: $VITE_SUPABASE_URL && npm install --no-audit --no-fund --loglevel=error && export NODE_OPTIONS=\"--max-old-space-size=4096\" && npm run build:netlify"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.11.1"
  NPM_VERSION = "10.2.4"
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_PNPM = "false"
  
  # 🔥 VARIABLES PUBLIQUES SUPABASE POUR PANEL ADMIN (OBLIGATOIRES SUR NETLIFY)
  NEXT_PUBLIC_SUPABASE_URL = "https://pqubbqqzkgeosakziwnh.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdWJicXF6a2dlb3Nha3ppd25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4NTg1ODMsImV4cCI6MjA2NjQzNDU4M30.FdOQOwVJEHdR6pnHlKmculiRV7JMWSfw_Qm4Kpt56Cg"
  
  # 💳 VARIABLES PUBLIQUES STRIPE POUR PANEL ADMIN  
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_test_51R9nCKQIOmiow871O0n6NwCIpaJK3r10IAW81ZCrlp4Xm4MPGb0CTGWme1kAOANQFApW7J630T2ZQcBHdhhxS2EA00"
  
  # 🚨 CLÉS SECRÈTES À CONFIGURER DANS L'INTERFACE NETLIFY :
  # STRIPE_SECRET_KEY = Ajouter dans Site Settings > Environment variables

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Configuration de base des fonctions
[functions]
  directory = "functions"
  node_bundler = "esbuild"
  external_node_modules = ["langchain", "@rollup/rollup-android-arm-eabi"]
  included_files = ["src/lib/ai_logic/**", "functions/rome-search/rome_appellations.csv", "data/unix_arborescence_competences_v459_utf8.csv"]
  # node_bundler et external_node_modules sont maintenant sous [build.functions]


# Configuration du cache - DÉSACTIVÉ TEMPORAIREMENT POUR DEBUG
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/locales/*.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Règle de redirection pour Single Page Application (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
